backend:
  name: git-gateway
  branch: main 

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "posts"
    label: "Artikel"
    folder: "content/posts"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Judul", name: "title", widget: "string" }
      - { label: "Tanggal", name: "date", widget: "datetime" }
      - { label: "Deskripsi", name: "excerpt", widget: "text" }
      - { label: "Gambar", name: "image", widget: "image" }
      - { label: "Kategori", name: "category", widget: "select", options: ["Keuangan", "SEO", "AI", "Blogging", "Teknologi"] }
      - { label: "Tags", name: "tags", widget: "list" }
      - { label: "Penulis", name: "author", widget: "string", default: "Admin" }
      - { label: "Waktu Baca (menit)", name: "readTime", widget: "number", default: 5 }
      - { label: "Featured", name: "featured", widget: "boolean", default: false }
      - { label: "Konten", name: "body", widget: "markdown" }
